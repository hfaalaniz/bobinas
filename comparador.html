<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparador de Núcleos — Suite Magnética</title>
    <link rel="stylesheet" href="bobinas.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles_validation.css">
    <link rel="stylesheet" href="styles_additional.css">
    <link rel="stylesheet" href="styles_modules.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        body { background: var(--bg); padding: 0; }
    </style>
</head>
<body>

<div class="page-header">
    <a href="index.html" class="back-btn">← Inicio</a>
    <div>
        <div class="page-title">📊 Comparador de Núcleos Magnéticos</div>
        <div class="page-subtitle">Todos los materiales · Pérdidas · Peso · Costo relativo</div>
    </div>
</div>

<div class="page active" id="page-comparison">
    <div class="main-layout">
        <aside class="panel">
            <div class="panel-header">
                <h2>⚙️ Parámetros de Comparación</h2>
            </div>

            <div class="form-group">
                <label for="compInductance">Inductancia Deseada:</label>
                <div style="display:flex;gap:8px;">
                    <input type="number" id="compInductance" value="100" min="0.1" step="0.1" style="flex:1;">
                    <select id="compInductanceUnit" style="width:80px;">
                        <option value="uH">μH</option>
                        <option value="mH" selected>mH</option>
                        <option value="H">H</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="compCurrent">Corriente (A):</label>
                <input type="number" id="compCurrent" value="1" min="0.01" step="0.01">
            </div>

            <div class="form-group">
                <label for="compOD">Diámetro Exterior Toroide (mm):</label>
                <input type="number" id="compOD" value="30" min="5" step="1">
            </div>

            <div class="form-group">
                <label for="compID">Diámetro Interior Toroide (mm):</label>
                <input type="number" id="compID" value="15" min="1" step="1">
            </div>

            <div class="form-group">
                <label for="compHeight">Altura del Toroide (mm):</label>
                <input type="number" id="compHeight" value="10" min="1" step="1">
            </div>

            <div class="form-group">
                <label for="compWireGauge">Calibre del Cable (AWG):</label>
                <input type="number" id="compWireGauge" value="20" min="10" max="40">
            </div>

            <button class="btn-primary" onclick="compareAllCores()">📊 Comparar Núcleos</button>
        </aside>

        <main class="results-area">
            <div class="results-header">
                <h2>📊 Comparación de Materiales</h2>
            </div>
            <div id="comparisonResults" class="result-container">
                <p class="placeholder-text">Configure los parámetros y presione "Comparar Núcleos"</p>
            </div>
            <div class="canvas-container" style="margin-top:20px;">
                <h3>Pérdidas Totales por Material</h3>
                <canvas id="comparisonChart"></canvas>
            </div>
        </main>
    </div>
</div>

<script src="dialog.js" defer></script>
<script src="data.js" defer></script>
<script src="calculations.js" defer></script>
<script src="val.js" defer></script>
<script src="graphics.js" defer></script>
<script src="export.js" defer></script>
<script src="main.js" defer></script>
</body>
</html>
