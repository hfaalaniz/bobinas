<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de Revistas — Editores SRL</title>
<link rel="stylesheet" href="bobinas.css">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="styles_validation.css">
<link rel="stylesheet" href="styles_additional.css">
<link rel="stylesheet" href="styles_modules.css">
<style>
body { padding: 0; }

/* ── Controles ── */
.rv-controls {
    max-width: 1200px; margin: 0 auto;
    padding: 18px 20px 0;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.rv-search {
    flex: 1; min-width: 200px;
    padding: 9px 13px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: .9rem; background: #fff; color: var(--text);
}
.rv-search:focus { outline: none; border-color: var(--primary); }
.rv-filters { display: flex; gap: 7px; flex-wrap: wrap; }
.rv-filter-btn {
    padding: 7px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); font-size: .82rem; font-weight: 600;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; gap: 5px;
}
.rv-filter-btn:hover { border-color: var(--primary); color: var(--primary); }
.rv-filter-btn.active { background: var(--plight); border-color: var(--primary); color: var(--primary); }
.rv-count-badge { font-size: 10px; background: var(--border); border-radius: 8px; padding: 1px 6px; }
.rv-info { font-size: .82rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

/* ── Grid de cards ── */
.rv-grid {
    max-width: 1200px; margin: 0 auto;
    padding: 18px 20px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
}

/* ── Card ── */
.rv-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: box-shadow .2s, transform .2s;
    cursor: pointer;
}
.rv-card:hover { box-shadow: 0 6px 24px rgba(29,78,216,.13); transform: translateY(-3px); }

/* Portada — iframe con primera página del PDF */
.rv-thumb {
    width: 100%; aspect-ratio: 3/4;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
    border-bottom: 1px solid var(--border);
    font-size: 3rem; color: var(--border);
}
.rv-thumb iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none; pointer-events: none;
    /* Escala la hoja A4 (842px) al ancho de la card (~200px) */
    transform: scale(0.24);
    transform-origin: top left;
    width: 417%;   /* 100 / 0.24 */
    height: 417%;
}

/* Cuerpo */
.rv-card-body { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.rv-card-cat {
    display: inline-block; padding: 2px 7px; border-radius: 10px;
    font-size: 10px; font-weight: 700; align-self: flex-start;
}
.cat-IE { background: #dbeafe; color: #1d4ed8; }
.cat-LU { background: #dcfce7; color: #15803d; }
.cat-AA { background: #ede9fe; color: #6d28d9; }
.cat-AN { background: #fef9c3; color: #854d0e; }

.rv-card-title { font-size: .8rem; font-weight: 700; color: var(--text); line-height: 1.3; flex: 1; }
.rv-card-btns  { display: flex; gap: 5px; margin-top: 6px; }
.rv-btn-read {
    flex: 1; padding: 6px 0; border-radius: 6px;
    background: var(--primary); color: #fff;
    border: none; font-size: .76rem; font-weight: 700;
    cursor: pointer; text-align: center;
    transition: background .2s;
}
.rv-btn-read:hover { background: #1e40af; }
.rv-btn-dl {
    padding: 6px 9px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: .76rem; font-weight: 700;
    cursor: pointer; text-decoration: none;
    transition: all .2s;
}
.rv-btn-dl:hover { border-color: var(--primary); color: var(--primary); }

/* ── Modal lector ── */
.rv-modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(15,23,42,.75); z-index: 1000;
    align-items: center; justify-content: center;
}
.rv-modal-bg.open { display: flex; }
.rv-modal {
    background: var(--card); border-radius: 12px;
    width: 96vw; height: 96vh;
    display: flex; flex-direction: column;
    overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,.4);
}
.rv-modal-bar {
    padding: 11px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.rv-modal-title {
    font-size: .88rem; font-weight: 700; color: var(--text);
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rv-modal-dl {
    padding: 6px 14px; background: var(--primary); color: #fff;
    border: none; border-radius: 6px; font-size: .82rem; font-weight: 700;
    cursor: pointer; text-decoration: none; transition: background .2s;
}
.rv-modal-dl:hover { background: #1e40af; }
.rv-modal-close {
    padding: 6px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 6px;
    font-size: .82rem; cursor: pointer; color: var(--text); transition: all .2s;
}
.rv-modal-close:hover { border-color: var(--red); color: var(--red); }
.rv-modal-frame { flex: 1; width: 100%; border: none; }

/* ── Vacío ── */
.rv-empty { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1/-1; }
.rv-empty-icon { font-size: 3rem; margin-bottom: 12px; }

/* ── Responsive ── */
@media (max-width: 600px) {
    .rv-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .rv-modal { width: 100vw; height: 100vh; border-radius: 0; }
}
</style>
</head>
<body>

<div class="page-header">
    <a href="index.html" class="back-btn">← Inicio</a>
    <div>
        <div class="page-title">📚 Biblioteca de Revistas</div>
        <div class="page-subtitle">Editores SRL — Ingeniería Eléctrica, Luminotecnia y AADECA · archivos locales</div>

<div class="rv-controls">

        </button>

    </div>
    <span class="rv-info" id="rvInfo"></span>
</div>

<div class="rv-grid" id="rvGrid"></div>

<!-- Modal lector -->
<div class="rv-modal-bg" id="rvModal" onclick="cerrarModal(event)">
    <div class="rv-modal">

// ── Título legible ────────────────────────────────────────────────────────
function titulo(filename) {
    let s = decodeURIComponent(filename)
        .replace(/\.pdf$/i, '')
        .replace(/_100dpi|_150dpi|_web_\d?|_web\d?|_baja_\d?|_baja\d?|-BAJA|_completa/gi, '')
        .replace(/_0$/, '')
        .replace(/[-_]+/g, ' ')
        .trim();

    const mNum  = s.match(/\b(\d{3,})\b/);
    const mYear = s.match(/\b(20\d{2})\b/);
    const mMes  = s.match(/enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre/i);
    const num   = mNum  ? `#${mNum[1]}`   : '';
    const year  = mYear ? ` · ${mYear[1]}` : '';
    const mes   = mMes  ? ` ${mMes[0]}`   : '';

    const sl = s.toLowerCase();
    if (sl.includes('ingenieria electrica') || sl.includes('ingeniera electrica') || sl.match(/^ie\d/))
        return `Ing. Eléctrica ${num}${mes}${year}`.replace(/\s+/g,' ').trim();
    if (sl.includes('luminotecnia') || sl.match(/^lu1/))
        return `Luminotecnia ${num}${year}`.trim();
    if (sl.includes('aadeca'))
        return `AADECA ${num}${mes}${year}`.replace(/\s+/g,' ').trim();
    if (sl.includes('anuario'))
        return `Anuario${year}`;
    return s.split(' ').map(w => w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');
}

// Añadir id y titulo a cada entrada
CATALOGO.forEach((r, i) => {
    r.id = i;
    r.filename = r.path.split('/').pop();
    r.titulo = titulo(r.filename);
});

// ── Contadores ────────────────────────────────────────────────────────────
const counts = { ALL: CATALOGO.length, IE: 0, LU: 0, AA: 0 };
CATALOGO.forEach(r => counts[r.cat]++);
Object.keys(counts).forEach(k => {
    const el = document.getElementById('cnt-' + k);
    if (el) el.textContent = counts[k];
});

// ── Estado ────────────────────────────────────────────────────────────────
let filtroAct = 'ALL';
let busqueda  = '';

window.setFiltro = function(cat, btn) {
    filtroAct = cat;
    document.querySelectorAll('.rv-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
};

window.filtrar = function() {
    busqueda = document.getElementById('rvSearch').value.toLowerCase();
    renderGrid();
};

// ── Render ────────────────────────────────────────────────────────────────
const CAT_LABEL = { IE: 'Ing. Eléctrica', LU: 'Luminotecnia', AA: 'AADECA', AN: 'Anuario' };

function lista() {
    return CATALOGO.filter(r => {
        const catOk  = filtroAct === 'ALL' || r.cat === filtroAct;
        const textOk = !busqueda || r.titulo.toLowerCase().includes(busqueda)
                                 || r.filename.toLowerCase().includes(busqueda);
        return catOk && textOk;
    });
}

function renderGrid() {
    const items = lista();
    document.getElementById('rvInfo').textContent = `${items.length} revista${items.length !== 1 ? 's' : ''}`;
    const grid = document.getElementById('rvGrid');

    if (!items.length) {
        grid.innerHTML = `<div class="rv-empty"><div class="rv-empty-icon">📭</div><p>Sin resultados para "<strong>${busqueda}</strong>"</p></div>`;
        return;
    }

    grid.innerHTML = items.map(r => `
        <div class="rv-card" data-id="${r.id}" onclick="abrirModal(${r.id})">
            <div class="rv-thumb" data-path="${r.path}">📄</div>
            <div class="rv-card-body">
                <span class="rv-card-cat cat-${r.cat}">${CAT_LABEL[r.cat]}</span>
                <div class="rv-card-title">${r.titulo}</div>
                <div class="rv-card-btns">
                    <button class="rv-btn-read">📖 Leer</button>
                    <a class="rv-btn-dl" href="${r.path}" download="${r.filename}"
                       onclick="event.stopPropagation()" title="Descargar">⬇</a>
                </div>
            </div>
        </div>
    `).join('');

    observarThumbs();
}

// ── Preview lazy con IntersectionObserver ─────────────────────────────────
// Carga un iframe con el PDF local escalado para mostrar la portada
const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
        if (!e.isIntersecting || e.target.dataset.loaded) return;
        e.target.dataset.loaded = '1';
        observer.unobserve(e.target);

        const path = e.target.dataset.path;
        const iframe = document.createElement('iframe');
        // PDF local: el navegador lo renderiza directamente
        // #toolbar=0 oculta la barra de herramientas del visor nativo
        iframe.src = path + '#toolbar=0&navpanes=0&scrollbar=0&view=FitH';
        iframe.title = 'portada';
        iframe.setAttribute('loading', 'lazy');
        e.target.textContent = '';   // quita el ícono de placeholder
        e.target.appendChild(iframe);
    });
}, { rootMargin: '300px' });

function observarThumbs() {
    document.querySelectorAll('.rv-thumb:not([data-obs])').forEach(th => {
        th.dataset.obs = '1';
        observer.observe(th);
    });
}

// ── Modal ─────────────────────────────────────────────────────────────────
window.abrirModal = function(id) {
    const r = CATALOGO.find(x => x.id === id);
    if (!r) return;
    document.getElementById('rvModalTitle').textContent = r.titulo;
    const dl = document.getElementById('rvModalDl');
    dl.href     = r.path;
    dl.download = r.filename;
    // PDF local renderizado en iframe a pantalla completa
    document.getElementById('rvModalFrame').src = r.path + '#toolbar=1';
    document.getElementById('rvModal').classList.add('open');
    document.body.style.overflow = 'hidden';
};

window.cerrarModal = function(e) {
    if (e && e.target !== document.getElementById('rvModal')) return;
    document.getElementById('rvModal').classList.remove('open');
    document.getElementById('rvModalFrame').src = 'about:blank';
    document.body.style.overflow = '';
};

document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

// ── Arranque ──────────────────────────────────────────────────────────────
renderGrid();
</script>
