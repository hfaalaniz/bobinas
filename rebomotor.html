<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebobinado de Motores — Calculadora</title>
    <style>
        /* ─── Reset & Base ───────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:      #0a0f1e;
            --bg2:     #111827;
            --bg3:     #1e293b;
            --border:  #1e3a5f;
            --acc:     #0ea5e9;
            --acc2:    #7c3aed;
            --green:   #10b981;
            --orange:  #f59e0b;
            --red:     #ef4444;
            --cyan:    #22d3ee;
            --purple:  #a78bfa;
            --text:    #e2e8f0;
            --muted:   #64748b;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── Header ──────────────────────────────────────────────────────────── */
        .rm-header {
            background: linear-gradient(135deg, #0c1b33, #1a0a2e);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .rm-header-back {
            color: var(--acc);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .rm-header-back:hover { opacity: 1; }
        .rm-header-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--acc), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .rm-header-sub {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ─── Layout ──────────────────────────────────────────────────────────── */
        .rm-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: calc(100vh - 70px);
        }

        /* ─── Sidebar (pasos) ─────────────────────────────────────────────────── */
        .rm-sidebar {
            background: var(--bg2);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .rm-sidebar-title {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
            padding: 0 8px;
            margin-bottom: 8px;
        }
        #rm-pasos { display: flex; flex-direction: column; gap: 6px; }
        .rm-paso-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .rm-paso-item:hover  { background: rgba(14,165,233,0.08); border-color: var(--border); }
        .rm-paso-item.activo { background: rgba(14,165,233,0.15); border-color: var(--acc); }
        .rm-paso-item.completado .rm-paso-num { background: var(--green); border-color: var(--green); }
        .rm-paso-num {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .rm-paso-item.activo .rm-paso-num { border-color: var(--acc); color: var(--acc); }
        .rm-paso-icon  { font-size: 0.95rem; }
        .rm-paso-label { font-size: 0.82rem; color: var(--text); }
        .rm-paso-item.activo .rm-paso-label { color: var(--acc); font-weight: 600; }

        /* ─── Main ────────────────────────────────────────────────────────────── */
        .rm-main {
            padding: 28px 32px;
            overflow-y: auto;
        }

        /* ─── Formulario ──────────────────────────────────────────────────────── */
        .rm-form-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }
        .rm-form-icon { font-size: 2rem; }
        .rm-form-title { font-size: 1.3rem; font-weight: 700; }
        .rm-form-sub   { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

        .rm-tip {
            background: rgba(14,165,233,0.08);
            border: 1px solid rgba(14,165,233,0.25);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.84rem;
            color: #93c5fd;
            margin-bottom: 20px;
        }
        .rm-tip-info { background:rgba(168,85,247,0.08); border-color:rgba(168,85,247,0.25); color:#c4b5fd; }
        .rm-tip-ok   { background:rgba(16,185,129,0.08); border-color:rgba(16,185,129,0.25); color:#6ee7b7; }

        .rm-fg2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .rm-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .rm-field label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .rm-hint {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--bg3); border: 1px solid var(--border);
            font-size: 10px; color: var(--muted); cursor: help;
        }
        .rm-input {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 0.95rem;
            transition: border-color 0.2s;
            width: 100%;
        }
        .rm-input:focus { outline: none; border-color: var(--acc); }
        select.rm-input option { background: var(--bg3); }

        /* Nav buttons */
        .rm-nav-btns {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .rm-btn {
            padding: 11px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .rm-btn-pri  { background: var(--acc); color: #fff; }
        .rm-btn-pri:hover { background: #0284c7; }
        .rm-btn-sec  { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
        .rm-btn-sec:hover { border-color: var(--acc); }
        .rm-btn-calc {
            background: linear-gradient(135deg, var(--green), #059669);
            color: #fff;
            padding: 13px 32px;
            font-size: 1rem;
        }
        .rm-btn-calc:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(16,185,129,0.35); }

        /* ─── Panel NEMA ─────────────────────────────────────────────────────── */
        .rm-nema-panel {
            background: rgba(14,165,233,0.06);
            border: 1px solid rgba(14,165,233,0.22);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 20px;
        }
        .rm-nema-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--acc);
            margin-bottom: 10px;
        }
        .rm-nema-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .rm-btn-nema {
            padding: 10px 18px;
            background: linear-gradient(135deg, #0ea5e9, #7c3aed);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: opacity 0.2s;
        }
        .rm-btn-nema:hover { opacity: 0.85; }
        .rm-nema-info {
            margin-top: 8px;
            padding: 7px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
            line-height: 1.6;
            background: rgba(16,185,129,0.10);
            border: 1px solid rgba(16,185,129,0.30);
            color: #6ee7b7;
        }
        .rm-nema-info-ok {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.80rem;
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.25);
            color: #6ee7b7;
            margin-bottom: 12px;
        }

        /* ─── Tabla de conexionado NEMA ──────────────────────────────────────── */
        .rm-nema-conn-wrap { margin-top: 4px; }
        .rm-conn-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            margin-top: 4px;
        }
        .rm-conn-table th {
            background: var(--bg3);
            padding: 7px 10px;
            text-align: left;
            color: var(--acc);
            font-size: 0.78rem;
            border: 1px solid var(--border);
        }
        .rm-conn-table td {
            padding: 8px 10px;
            border: 1px solid var(--border);
            font-family: monospace;
            font-size: 0.85rem;
            color: #f8fafc;
            background: rgba(255,255,255,0.02);
        }
        .rm-nema-marcado {
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--muted);
            line-height: 1.8;
            padding: 6px 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        /* ─── Bav inline calculator ──────────────────────────────────────────── */
        .rm-bav-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        .rm-bav-input { flex: 1; }
        .rm-btn-bav {
            padding: 0 16px;
            background: linear-gradient(135deg, #0ea5e9, #7c3aed);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .rm-btn-bav:hover { opacity: 0.85; }
        .rm-bav-info {
            margin-top: 6px;
            padding: 7px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
            line-height: 1.5;
        }
        .rm-bav-ok   { background: rgba(16,185,129,0.10); border: 1px solid rgba(16,185,129,0.30); color: #6ee7b7; }
        .rm-bav-warn { background: rgba(245,158,11,0.10); border: 1px solid rgba(245,158,11,0.30); color: #fcd34d; }

        /* ─── Slot diagram ────────────────────────────────────────────────────── */
        .rm-slot-diagram {
            float: right;
            margin: 0 0 16px 20px;
        }

        /* ─── Resumen de datos ────────────────────────────────────────────────── */
        .rm-resumen-datos {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }
        .rm-res-fila {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.88rem;
        }
        .rm-res-fila:last-child { border-bottom: none; }
        .rm-res-fila span { color: var(--muted); }

        /* ─── Resultados ──────────────────────────────────────────────────────── */
        #rm-resultados-wrap { margin-top: 32px; }
        #rm-resultados-wrap.hidden { display: none; }
        .rm-res-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .rm-card {
            background: rgba(15,23,42,0.7);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
        }
        .rm-card-blue   { border-color: #1d4ed8; }
        .rm-card-purple { border-color: #6d28d9; }
        .rm-card-green  { border-color: #065f46; }
        .rm-card-orange { border-color: #92400e; }
        .rm-card-cyan   { border-color: #0e7490; }
        .rm-card-red    { border-color: #7f1d1d; }

        .rm-card-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .rm-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .rm-table tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
        .rm-table tr:last-child { border-bottom: none; }
        .rm-table td { padding: 6px 4px; }
        .rm-table td:first-child { color: var(--muted); width: 55%; }
        .rm-table td:last-child  { text-align: right; }
        .rm-table tr.rm-highlight { background: rgba(14,165,233,0.07); }
        .rm-table tr.rm-highlight td:first-child { color: var(--acc); }

        /* Panel preview datos de placa */
        .rm-prev-item {
            background: rgba(255,255,255,0.06);
            border-radius: 7px;
            padding: 8px 11px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .rm-prev-lbl {
            font-size: .72rem;
            color: var(--muted);
        }
        .rm-prev-val {
            font-size: .95rem;
            color: var(--text);
        }

        /* Alertas */
        .rm-alerta {
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.83rem;
            color: #fcd34d;
            margin-bottom: 8px;
        }
        .rm-alerta-warn {
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.3);
            color: #fcd34d;
        }
        .rm-alerta-info {
            background: rgba(14,165,233,0.08);
            border: 1px solid rgba(14,165,233,0.25);
            color: #93c5fd;
        }
        .rm-alerta.rm-ok {
            background: rgba(16,185,129,0.08);
            border-color: rgba(16,185,129,0.25);
            color: #6ee7b7;
        }

        /* Tabla de ranuras */
        .rm-slot-table {
            border-collapse: collapse;
            font-size: 0.78rem;
            min-width: 100%;
        }
        .rm-slot-table th {
            background: var(--bg3);
            padding: 4px 6px;
            font-size: 0.72rem;
            text-align: center;
            color: var(--muted);
        }
        .rm-slot-table td { padding: 4px 3px; min-width: 32px; }

        /* Protocolo */
        .rm-protocolo {
            list-style: none;
            counter-reset: proto;
        }
        .rm-protocolo li {
            counter-increment: proto;
            position: relative;
            padding: 10px 10px 10px 44px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.84rem;
            line-height: 1.6;
        }
        .rm-protocolo li::before {
            content: counter(proto);
            position: absolute;
            left: 0; top: 10px;
            width: 28px; height: 28px;
            background: rgba(14,165,233,0.15);
            border: 1px solid var(--acc);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--acc);
        }
        .rm-protocolo li:last-child { border-bottom: none; }

        /* Results wrap title */
        .rm-results-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--acc);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        /* Responsive */
        @media (max-width: 800px) {
            .rm-layout { grid-template-columns: 1fr; }
            .rm-sidebar { flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--border); padding: 12px; }
            #rm-pasos { flex-direction: row; flex-wrap: wrap; }
            .rm-main { padding: 16px; }
            .rm-fg2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="rm-header">
    <a href="index.html" class="rm-header-back">← Volver</a>
    <div>
        <div class="rm-header-title">⚡ Calculadora de Rebobinado</div>
        <div class="rm-header-sub">Calcula paso, calibre y vueltas desde geometría — sin necesitar datos del bobinado original</div>
    </div>
</header>

<!-- ── Layout ──────────────────────────────────────────────────────────────── -->
<div class="rm-layout">

    <!-- SIDEBAR -->
    <aside class="rm-sidebar">
        <div class="rm-sidebar-title">Asistente</div>
        <div id="rm-pasos"><!-- JS --></div>
    </aside>

    <!-- MAIN -->
    <main class="rm-main">
        <!-- Formulario paso a paso -->
        <div id="rm-formulario"><!-- JS --></div>

        <!-- Resultados (hidden hasta calcular) -->
        <div id="rm-resultados-wrap" class="hidden">
            <div class="rm-results-title">📊 Resultados del Cálculo</div>
            <div id="rm-resultados"><!-- JS --></div>
        </div>
    </main>

</div>

<script src="rebomotor.js" defer></script>
</body>
</html>
