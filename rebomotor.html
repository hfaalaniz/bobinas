<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebobinado de Motores — Calculadora</title>
    <link rel="stylesheet" href="bobinas.css">
    <style>
        /* Variables adicionales de rebomotor (sobre bobinas.css) */
        :root {
            --bg2:   #f8fafc;
            --bg3:   #f1f5f9;
            --acc:   var(--primary);
            --acc2:  #7c3aed;
            --cyan:  #0891b2;
            --purple:#7c3aed;
        }
        body { padding: 0; min-height: 100vh; }

        /* ─── Header ──────────────────────────────────────────────────────────── */
        .rm-header {
            background: var(--plight);
            border-bottom: 2px solid var(--border);
            padding: 14px 24px;
            display: flex; align-items: center; gap: 16px;
        }
        .rm-header-back { color: var(--primary); text-decoration: none; font-size: .9rem; font-weight: 600; transition: opacity .2s; }
        .rm-header-back:hover { opacity: .75; }
        .rm-header-title { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        .rm-header-sub   { font-size: .8rem; color: var(--muted); margin-top: 2px; }

        /* ─── Layout ────────────────────────────────────────────────────────── */
        .rm-layout { display: grid; grid-template-columns: 230px 1fr; min-height: calc(100vh - 62px); }

        /* ─── Sidebar ───────────────────────────────────────────────────────── */
        .rm-sidebar { background: var(--card); border-right: 1px solid var(--border); padding: 20px 14px; display: flex; flex-direction: column; gap: 6px; }
        .rm-sidebar-title { font-size: .7rem; font-weight: 700; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; padding: 0 8px; margin-bottom: 8px; }
        #rm-pasos { display: flex; flex-direction: column; gap: 5px; }
        .rm-paso-item { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border-radius: 9px; cursor: pointer; transition: all .2s; border: 1px solid transparent; }
        .rm-paso-item:hover  { background: var(--plight); border-color: var(--border); }
        .rm-paso-item.activo { background: var(--plight); border-color: var(--primary); }
        .rm-paso-item.completado .rm-paso-num { background: var(--green); border-color: var(--green); color: #fff; }
        .rm-paso-num { width: 27px; height: 27px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; transition: all .2s; }
        .rm-paso-item.activo .rm-paso-num { border-color: var(--primary); color: var(--primary); }
        .rm-paso-icon  { font-size: .95rem; }
        .rm-paso-label { font-size: .82rem; color: var(--text); }
        .rm-paso-item.activo .rm-paso-label { color: var(--primary); font-weight: 600; }

        /* ─── Main ──────────────────────────────────────────────────────────── */
        .rm-main { padding: 26px 30px; overflow-y: auto; background: var(--bg); }

        /* ─── Formulario ────────────────────────────────────────────────────── */
        .rm-form-header { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
        .rm-form-icon  { font-size: 2rem; }
        .rm-form-title { font-size: 1.2rem; font-weight: 700; color: var(--text); }
        .rm-form-sub   { font-size: .8rem; color: var(--muted); margin-top: 2px; }

        .rm-tip { background: var(--plight); border: 1px solid #bfdbfe; border-radius: 8px; padding: 10px 14px; font-size: .84rem; color: #1e40af; margin-bottom: 18px; }
        .rm-tip-info { background: #faf5ff; border-color: #d8b4fe; color: #6b21a8; }
        .rm-tip-ok   { background: #f0fdf4; border-color: #86efac; color: #14532d; }

        .rm-fg2   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        .rm-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .rm-field label { font-size: .82rem; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 6px; }
        .rm-hint  { display: inline-flex; align-items: center; justify-content: center; width: 15px; height: 15px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); font-size: 10px; color: var(--muted); cursor: help; }
        .rm-input { background: #fff; border: 1px solid var(--border); border-radius: 7px; padding: 9px 11px; color: var(--text); font-size: .92rem; transition: border-color .2s; width: 100%; }
        .rm-input:focus { outline: none; border-color: var(--primary); }

        /* Nav buttons */
        .rm-nav-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 26px; padding-top: 18px; border-top: 1px solid var(--border); }
        .rm-btn { padding: 10px 22px; border-radius: 7px; border: none; font-weight: 600; font-size: .88rem; cursor: pointer; transition: all .2s; }
        .rm-btn-pri  { background: var(--primary); color: #fff; }
        .rm-btn-pri:hover  { background: #1e40af; }
        .rm-btn-sec  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .rm-btn-sec:hover  { border-color: var(--primary); }
        .rm-btn-calc { background: linear-gradient(135deg, var(--primary), #7c3aed); color: #fff; padding: 12px 30px; font-size: .95rem; }
        .rm-btn-calc:hover { opacity: .9; }

        /* ─── Panel NEMA ────────────────────────────────────────────────────── */
        .rm-nema-panel { background: var(--plight); border: 1px solid #bfdbfe; border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; }
        .rm-nema-title { font-size: .82rem; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
        .rm-nema-row   { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .rm-btn-nema   { padding: 9px 17px; background: var(--primary); color: #fff; border: none; border-radius: 7px; font-size: .84rem; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background .2s; }
        .rm-btn-nema:hover { background: #1e40af; }
        .rm-nema-info    { margin-top: 8px; padding: 7px 10px; border-radius: 6px; font-size: .78rem; line-height: 1.6; background: #f0fdf4; border: 1px solid #86efac; color: #14532d; }
        .rm-nema-info-ok { padding: 8px 12px; border-radius: 6px; font-size: .80rem; background: #f0fdf4; border: 1px solid #86efac; color: #14532d; margin-bottom: 12px; }

        /* ─── Tabla conexionado NEMA ────────────────────────────────────────── */
        .rm-nema-conn-wrap { margin-top: 4px; }
        .rm-conn-table { width: 100%; border-collapse: collapse; font-size: .82rem; margin-top: 4px; }
        .rm-conn-table th { background: var(--plight); padding: 7px 10px; text-align: left; color: var(--primary); font-size: .78rem; border: 1px solid var(--border); }
        .rm-conn-table td { padding: 8px 10px; border: 1px solid var(--border); font-family: monospace; font-size: .85rem; color: var(--text); background: var(--surface2); }
        .rm-nema-marcado  { margin-top: 8px; font-size: .75rem; color: var(--muted); line-height: 1.8; padding: 6px 10px; background: var(--surface2); border-radius: 6px; border: 1px solid var(--border); }

        /* ─── Bav calculator ────────────────────────────────────────────────── */
        .rm-bav-row  { display: flex; gap: 8px; align-items: stretch; }
        .rm-bav-input{ flex: 1; }
        .rm-btn-bav  { padding: 0 15px; background: var(--primary); color: #fff; border: none; border-radius: 7px; font-size: .82rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background .2s; }
        .rm-btn-bav:hover { background: #1e40af; }
        .rm-bav-info { margin-top: 6px; padding: 7px 10px; border-radius: 6px; font-size: .78rem; line-height: 1.5; }
        .rm-bav-ok   { background: #f0fdf4; border: 1px solid #86efac; color: #14532d; }
        .rm-bav-warn { background: #fefce8; border: 1px solid #fde047; color: #713f12; }

        /* ─── Slot diagram ──────────────────────────────────────────────────── */
        .rm-slot-diagram { float: right; margin: 0 0 16px 20px; }

        /* ─── Resumen de datos ──────────────────────────────────────────────── */
        .rm-resumen-datos { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 15px; }
        .rm-res-fila { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: .87rem; }
        .rm-res-fila:last-child { border-bottom: none; }
        .rm-res-fila span { color: var(--muted); }

        /* ─── Cards de resultados ───────────────────────────────────────────── */
        #rm-resultados-wrap { margin-top: 28px; }
        #rm-resultados-wrap.hidden { display: none; }
        .rm-res-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
        .rm-card { background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 16px; }
        .rm-card-blue   { border-left: 3px solid #1d4ed8; }
        .rm-card-purple { border-left: 3px solid #7c3aed; }
        .rm-card-green  { border-left: 3px solid #16a34a; }
        .rm-card-orange { border-left: 3px solid #ea580c; }
        .rm-card-cyan   { border-left: 3px solid #0891b2; }
        .rm-card-red    { border-left: 3px solid #dc2626; }
        .rm-card-title  { font-size: .88rem; font-weight: 700; color: var(--text); margin-bottom: 11px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

        .rm-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
        .rm-table tr { border-bottom: 1px solid var(--border); }
        .rm-table tr:last-child { border-bottom: none; }
        .rm-table td { padding: 6px 4px; }
        .rm-table td:first-child { color: var(--muted); width: 55%; }
        .rm-table td:last-child  { text-align: right; font-weight: 600; }
        .rm-table tr.rm-highlight { background: var(--plight); }
        .rm-table tr.rm-highlight td:first-child { color: var(--primary); }

        /* Panel preview datos de placa */
        .rm-prev-item { background: var(--surface2); border-radius: 7px; padding: 8px 11px; display: flex; flex-direction: column; gap: 2px; }
        .rm-prev-lbl  { font-size: .72rem; color: var(--muted); }
        .rm-prev-val  { font-size: .95rem; color: var(--text); font-weight: 600; }

        /* Alertas */
        .rm-alerta      { background: #fefce8; border: 1px solid #fde047; border-radius: 8px; padding: 10px 14px; font-size: .83rem; color: #713f12; margin-bottom: 8px; }
        .rm-alerta-warn { background: #fefce8; border-color: #fde047; color: #713f12; }
        .rm-alerta-info { background: var(--plight); border-color: #bfdbfe; color: #1e40af; }
        .rm-alerta.rm-ok{ background: #f0fdf4; border-color: #86efac; color: #14532d; }

        /* Tabla de ranuras */
        .rm-slot-table { border-collapse: collapse; font-size: .78rem; min-width: 100%; }
        .rm-slot-table th { background: var(--plight); padding: 4px 6px; font-size: .72rem; text-align: center; color: var(--primary); border-bottom: 1px solid var(--border); }
        .rm-slot-table td { padding: 4px 3px; min-width: 32px; }

        /* Protocolo */
        .rm-protocolo { list-style: none; counter-reset: proto; }
        .rm-protocolo li { counter-increment: proto; position: relative; padding: 10px 10px 10px 44px; border-bottom: 1px solid var(--border); font-size: .84rem; line-height: 1.6; color: var(--text); }
        .rm-protocolo li::before { content: counter(proto); position: absolute; left: 0; top: 10px; width: 28px; height: 28px; background: var(--plight); border: 1px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; color: var(--primary); }
        .rm-protocolo li:last-child { border-bottom: none; }

        /* Results title */
        .rm-results-title { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }

        /* Responsive */
        @media (max-width: 800px) {
            .rm-layout { grid-template-columns: 1fr; }
            .rm-sidebar { flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--border); padding: 10px; }
            #rm-pasos { flex-direction: row; flex-wrap: wrap; }
            .rm-main { padding: 14px; }
            .rm-fg2  { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="rm-header">
    <a href="index.html" class="rm-header-back">← Volver</a>
    <div>
        <div class="rm-header-title">⚡ Calculadora de Rebobinado</div>
        <div class="rm-header-sub">Calcula paso, calibre y vueltas desde geometría — sin necesitar datos del bobinado original</div>
    </div>
</header>

<!-- ── Layout ──────────────────────────────────────────────────────────────── -->
<div class="rm-layout">

    <!-- SIDEBAR -->
    <aside class="rm-sidebar">
        <div class="rm-sidebar-title">Asistente</div>
        <div id="rm-pasos"><!-- JS --></div>
    </aside>

    <!-- MAIN -->
    <main class="rm-main">
        <!-- Formulario paso a paso -->
        <div id="rm-formulario"><!-- JS --></div>

        <!-- Resultados (hidden hasta calcular) -->
        <div id="rm-resultados-wrap" class="hidden">
            <div class="rm-results-title">📊 Resultados del Cálculo</div>
            <div id="rm-resultados"><!-- JS --></div>
        </div>
    </main>

</div>

<script src="rebomotor.js" defer></script>
</body>
</html>
